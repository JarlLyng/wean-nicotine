name: Feature request
description: Suggest a new feature or improvement for Wean Nicotine.
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Wean is deliberately specific (gradual nicotine reduction, calm tone, local-first), so the clearer the problem you're trying to solve, the easier it is to evaluate. "Not right now" is a normal answer — it's not a judgement of the idea.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation or pain point. Skip mentioning a solution here.
      placeholder: 'When I miss a day of logging, my daily allowance the next day looks confusing because…'
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposed solution (optional)
      description: If you have an idea for how to address it, share it here. Otherwise leave blank.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
      description: Other approaches you thought about, including "do nothing" or workarounds you currently use.

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      description: Where would the feature live?
      options:
        - iOS app
        - Marketing website
        - Documentation
        - Other / cross-cutting
    validations:
      required: true

  - type: checkboxes
    id: alignment
    attributes:
      label: Alignment checks
      description: These help filter out requests that fall outside the project's vision. See [CONTRIBUTING.md](https://github.com/JarlLyng/wean-nicotine/blob/main/CONTRIBUTING.md#what-probably-wont-get-accepted).
      options:
        - label: This does not require an account, cloud sync, or sending data off-device
          required: true
        - label: This does not involve subscriptions, in-app purchases, or ad revenue
          required: true
        - label: I searched existing issues and didn't find a duplicate
          required: true
