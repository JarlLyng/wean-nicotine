      <stop offset="0" stop-color="#00FF7B" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D0FF00" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="#0A0A0A"/>
  <rect x="60" y="120" width="1170" height="2556" rx="120" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)"/>
